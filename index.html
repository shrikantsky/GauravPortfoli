<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio — Gaurav Khaire</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
            padding: 60px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 60px;
        }
        .back-link {
            display: inline-block;
            font-size: 0.6rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #888;
            text-decoration: none;
            margin-bottom: 30px;
            transition: color 0.25s;
        }
        .back-link:hover { color: #1a1a1a; }
        .name {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .title {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #888;
        }
        .divider {
            width: 30px;
            height: 1px;
            background: #ccc;
            margin: 40px auto;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .gallery-item {
            position: relative;
            aspect-ratio: 3/4;
            background: #e0e0e0;
            overflow: hidden;
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }
        .gallery-item:hover img {
            transform: scale(1.03);
        }
        .gallery-item .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.3s ease;
        }
        .gallery-item:hover .overlay {
            opacity: 1;
        }
        .overlay-text {
            color: #fff;
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .footer-text {
            text-align: center;
            margin-top: 60px;
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ccc;
        }
        @media (max-width: 600px) {
            .gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-link">← Back</a>
            <div class="name">Gaurav Khaire</div>
            <div class="title">Selected Work</div>
            <div class="divider"></div>
        </div>
        
        <div class="gallery">
            <!-- Replace src with your actual image paths -->
            <div class="gallery-item">
                <img src="images/portfolio-1.jpg" alt="Editorial 1">
                <div class="overlay">
                    <span class="overlay-text">Editorial</span>
                </div>
            </div>
            <div class="gallery-item">
                <img src="images/portfolio-2.jpg" alt="Campaign 1">
                <div class="overlay">
                    <span class="overlay-text">Campaign</span>
                </div>
            </div>
            <div class="gallery-item">
                <img src="images/portfolio-3.jpg" alt="Lookbook 1">
                <div class="overlay">
                    <span class="overlay-text">Lookbook</span>
                </div>
            </div>
            <div class="gallery-item">
                <img src="images/portfolio-4.jpg" alt="Editorial 2">
                <div class="overlay">
                    <span class="overlay-text">Editorial</span>
                </div>
            </div>
            <div class="gallery-item">
                <img src="images/portfolio-5.jpg" alt="Runway">
                <div class="overlay">
                    <span class="overlay-text">Runway</span>
                </div>
            </div>
            <div class="gallery-item">
                <img src="images/portfolio-6.jpg" alt="Campaign 2">
                <div class="overlay">
                    <span class="overlay-text">Campaign</span>
                </div>
            </div>
        </div>
        
        <div class="footer-text">theardourr.in</div>
    </div>
</body>
</html>
