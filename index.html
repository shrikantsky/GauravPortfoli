<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaurav Khaire</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #fff;
            max-width: 480px;
            width: 90%;
            padding: 60px 50px;
            text-align: center;
        }
        .name {
            font-size: 0.7rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .title {
            font-size: 0.7rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 40px;
        }
        .divider {
            width: 30px;
            height: 1px;
            background: #ccc;
            margin: 0 auto 40px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .link-btn {
            display: block;
            padding: 14px 20px;
            border: 1px solid #e0e0e0;
            text-decoration: none;
            color: #1a1a1a;
            font-size: 0.75rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.25s;
        }
        .link-btn:hover {
            background: #1a1a1a;
            color: #fff;
            border-color: #1a1a1a;
        }
        .link-btn.ig {
            border-color: #1a1a1a;
        }
        .footer-text {
            margin-top: 40px;
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #ccc;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="name">Gaurav Khaire</div>
        <div class="title">Fashion Model — Mumbai</div>
        <div class="divider"></div>
        <div class="links">
            <a href="portfolio.html" class="link-btn">Portfolio</a>
            <a href="https://www.instagram.com/gaurravkkhairre?igsh=dzdlODNmZjdsMHVx&utm_source=qr" target="_blank" class="link-btn ig">Instagram</a>
            <a href="mailto:gauravxwork@gmail.com" class="link-btn">Contact</a>
        </div>
        <div class="footer-text">theardourr.in</div>
    </div>
</body>
</html>
